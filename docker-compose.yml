version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: aerodb
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    networks:
      - aeronet

  redis:
    image: redis:alpine
    container_name: aerocache
    ports:
      - "6379:6379"
    networks:
      - aeronet

  backend:
    build: ./backend
    container_name: aerobackend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/product-management
      - JWT_SECRET=dev_jwt_secret_access_key_12345
      - JWT_ACCESS_EXPIRE=15m
      - JWT_REFRESH_SECRET=dev_jwt_secret_refresh_key_54321
      - JWT_REFRESH_EXPIRE=7d
      - CORS_ORIGIN=http://localhost:3000
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX=500
      - REDIS_ENABLED=true
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      - mongodb
      - redis
    networks:
      - aeronet

  frontend:
    build: ./frontend
    container_name: aerofrontend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api/v1
    depends_on:
      - backend
    networks:
      - aeronet

volumes:
  mongodata:

networks:
  aeronet:
    driver: bridge
